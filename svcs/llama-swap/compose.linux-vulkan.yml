services:
  llama-swap:
    # Use the Vulkan-optimized image
    image: ghcr.io/mostlygeek/llama-swap:vulkan
    container_name: llama-swap
    restart: unless-stopped
    ports:
      - "11400:8080"
    volumes:
      - "${HOME}/.cache/llama.cpp:/models"
      - "${HOME}/.config/llama-swap/config.yaml:/app/config.yaml"
    
    # Pass your AMD GPU into the container
    devices:
      - /dev/dri:/dev/dri
      # Optional: uncomment the line below if you also have ROCm drivers installed
      - /dev/kfd:/dev/kfd
