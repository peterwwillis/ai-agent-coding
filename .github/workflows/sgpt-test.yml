name: sgpt tests

on:
  pull_request:
    paths:
      - 'sgpt/**'

jobs:
  test:
    name: Go unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sgpt

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sgpt/go.mod
          cache-dependency-path: sgpt/go.sum

      - name: Vet
        run: make vet

      - name: Test
        run: make test
