name: sgpt tests

on:
  pull_request:
    paths:
      - 'apps/sgpt/**'

jobs:
  test:
    name: Go unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/sgpt

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/sgpt/go.mod
          cache-dependency-path: apps/sgpt/go.sum

      - name: Vet
        run: make vet

      - name: Test
        run: make test

  version-bump:
    name: Verify version was bumped
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version is newer than base branch
        run: |
          PR_VERSION=$(grep 'var version = ' apps/sgpt/main.go | sed 's/.*"\(.*\)".*/\1/')
          git fetch origin "${{ github.base_ref }}" --depth=1
          BASE_VERSION=$(git show "origin/${{ github.base_ref }}:apps/sgpt/main.go" \
            | grep 'var version = ' | sed 's/.*"\(.*\)".*/\1/')

          echo "Base branch version : $BASE_VERSION"
          echo "PR branch version   : $PR_VERSION"

          if [ "$PR_VERSION" = "$BASE_VERSION" ]; then
            echo "::error file=apps/sgpt/main.go::Version not bumped. Please update 'var version' in apps/sgpt/main.go (currently $PR_VERSION)."
            exit 1
          fi
          echo "Version bumped: $BASE_VERSION -> $PR_VERSION"
