services:

  devbox:
    image: devbox:latest
    container_name: devbox
    build:
      context: ../../
      dockerfile: sandbox/devbox/Dockerfile.devbox
      args:
        - DEVBOX_USER=${DEVBOX_USER:-devbox}
        - DEVBOX_UID=${DEVBOX_UID:-1001}
        - DEVBOX_GID=${DEVBOX_GID:-1001}
    volumes:
      - ./:/workspace
    working_dir: /workspace
    tty: true
    stdin_open: true
    networks:
      - dind-lab
    environment:
      # Playwright Test will connect to the remote browser server
      - PW_TEST_CONNECT_WS_ENDPOINT=ws://pw:3000/

networks:
  dind-lab:
    external: true
    name: dind-lab
