# Traefik reverse-proxy stack for local AI services
# Usage: docker compose up -d
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in your credentials:
#        cp .env.example .env && $EDITOR .env
#   2. Generate TLS cert/key files in ./certs/:
#        make gen-certs
#   3. Generate the basic-auth users file from .env:
#        make gen-users-file
#
# Or run all of the above in one step:
#   make setup

services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    ports:
      # HTTPS entrypoint
      - "443:443"
      # Traefik dashboard (comment out or restrict in production)
      - "127.0.0.1:8080:8080"
    command:
      # Enable the Traefik dashboard (disable in production)
      - "--api.dashboard=true"
      - "--api.insecure=true"
      # Log level: DEBUG | INFO | WARN | ERROR
      - "--log.level=INFO"
      # Define the HTTPS entrypoint
      - "--entrypoints.websecure.address=:443"
      # Enable the file provider for dynamic configuration
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      # Disable automatic TLS certificate resolution (we use local certs)
      - "--entrypoints.websecure.http.tls=true"
    volumes:
      # Dynamic config files (routes, middlewares, TLS)
      - ./dynamic:/etc/traefik/dynamic:ro
      # Local TLS certificates
      - ./certs:/etc/traefik/certs:ro
      # Basic-auth users file (generated by 'make gen-users-file' from .env)
      # NEVER commit this file – it is listed in .gitignore
      - ./secrets:/etc/traefik/secrets:ro
      # Docker socket (not needed when using file provider only)
      # - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    # Linux: uncomment to make host services reachable as host.docker.internal
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

networks:
  proxy:
    driver: bridge
